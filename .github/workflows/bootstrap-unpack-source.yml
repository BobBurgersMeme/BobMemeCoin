name: Unpack BobMemeCoin Source

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rebuild and unpack source archive
        shell: bash
        run: |
          set -euo pipefail
          cat source-parts/BobMemeCoin-source-v0.2.0.zip.part.* > BobMemeCoin-source-v0.2.0.zip
          unzip -q BobMemeCoin-source-v0.2.0.zip -d extracted
          rm -rf source-parts BobMemeCoin-source-v0.2.0.zip
          rm -f .github/workflows/bootstrap-unpack-source.yml
          shopt -s dotglob
          cp -a extracted/BobMemeCoin-source-v0.2.0/. .
          rm -rf extracted
      - name: Commit unpacked source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "BobMemeCoin Release Bot"
          git config user.email "release@bobmeme.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Unpack BobMemeCoin source"
            git push
          fi